# ci.yml — validation-only CI for every PR and every push to main/dev.
#
# What this workflow does:
#   - Build (TypeScript compile)
#   - Unit tests (vitest)
#   - Smoke test (MCP handshake + every registered tool)
#   - Docs build in strict mode (broken links, missing anchors, bad refs)
#   - Generated-docs drift check (configuration.md / tools.md vs server.json / Zod schemas)
#   - Spell check on docs + README + RELEASING.md
#
# What this workflow does NOT do:
#   - No npm publish. No MCP Registry publish. No GitHub Release. No tag creation.
#   - Publishing is tag-driven only, handled by .github/workflows/release.yml, which
#     triggers on `tags: ["v*"]` and has a main-branch guard that refuses tags
#     not reachable from origin/main. So a push to `dev` (or any non-tag event)
#     cannot publish — by trigger, by ref, and by guard.
#
# Concurrency: re-pushes to the same ref cancel older in-flight runs, so the
# latest code on a branch or PR is what gets validated.

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  # Queue, don't cancel: when main moves fast (rapid-fire promotes), we
  # want CI to finish on EVERY tagged commit — otherwise the cascade
  # (commit N+1's push cancels commit N's CI) leaves commit N's release
  # workflow stuck waiting on a CI run that will never succeed.
  #
  # Include the SHA in the group so re-pushes to the SAME commit still
  # coalesce (no duplicate CI runs on force-refreshes), while different
  # commits each get their own queued run.
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

env:
  # Pin transformers.js cache to a known workspace path so actions/cache can
  # restore + save it across runs. Without this override, models land under
  # node_modules/@huggingface/transformers/.cache (default), which survives
  # the cache step only if we target that path explicitly — simpler to just
  # route through $TRANSFORMERS_CACHE. Matches release.yml's pattern.
  TRANSFORMERS_CACHE: ${{ github.workspace }}/.cache/huggingface

jobs:
  validate:
    name: Build, test, smoke, docs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Fetch tags so `gen-readme-recent` can filter the CHANGELOG
          # entries to only versions that have shipped (have a `vX.Y.Z`
          # tag). Without this, default shallow checkout has no tags,
          # the filter excludes every prior version, and the --check
          # step in preflight fails. See v1.7.16 changelog.
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Hugging Face embedding models cache
        # Split restore/save so we only persist the cache AFTER prefetch
        # verifies integrity (see the "Save" step below the prefetch).
        # Without this split, actions/cache's default post-step would save
        # the cache directory unconditionally — including any partial
        # downloads left behind by a killed run. That's the original
        # "Protobuf parsing failed" root cause.
        #
        # Shared across main + dev: actions/cache writes are scoped per
        # branch, but restore-keys fall through to the default branch, so
        # dev runs read from main's cache when their own isn't populated.
        uses: actions/cache/restore@v5
        continue-on-error: true
        id: hf-cache-restore
        with:
          path: ${{ github.workspace }}/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2-bge-small-en-v1.5-v1
          restore-keys: |
            hf-models-all-MiniLM-L6-v2-bge-small-en-v1.5-
            hf-models-all-MiniLM-L6-v2-
            hf-models-

      - name: Build
        run: npm run build

      - name: Prefetch embedding models (with retries + corruption recovery)
        # Runs BEFORE vitest so flaky HF downloads can't surface as opaque
        # Protobuf-parsing errors inside a failing test suite. The script:
        #   - checks for 0-byte / suspiciously-small ONNX files restored
        #     from a prior cache and wipes them pre-emptively
        #   - retries up to 4 times per model with exponential backoff
        #   - on any Protobuf / ONNX / "Unable to get model file" error,
        #     wipes the model's cache subdir and tries again with a fresh
        #     download
        #   - exits non-zero with a clear message if all retries fail,
        #     instead of letting vitest surface a cryptic stack trace
        #
        # This warms the cache deterministically so vitest just reads from
        # disk — no parallel-download races between test files.
        id: prefetch
        run: node scripts/prefetch-test-models.mjs

      - name: Save Hugging Face embedding models cache
        # Only save the cache AFTER prefetch succeeded — `if: success()`
        # scoped to the prefetch step. If prefetch failed or retried with
        # corruption, we skip the save so a corrupt cache doesn't get
        # persisted under the key and poison future runs. This is the
        # defence against the original "killed mid-download → cache saved
        # with partial file → next run trusts it → Protobuf error" cycle.
        #
        # Also skip if the cache was already an exact-key hit on restore —
        # nothing changed, nothing to save.
        if: steps.prefetch.outcome == 'success' && steps.hf-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ${{ github.workspace }}/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2-bge-small-en-v1.5-v1

      - name: Unit tests + coverage
        # NOTE: if you change this invocation (flags, env, script name),
        # also update the "tests + coverage" step in scripts/preflight.mjs
        # — both places must stay in sync or CI and local will drift.
        run: npm run test:coverage

      - name: Upload coverage report
        # Runs regardless of earlier step outcome so the HTML report is
        # reachable whether CI is green (cheap debugging signal) or red
        # (no local re-run needed to see which file tripped the threshold).
        # Short retention keeps storage trivial. This is the load-bearing
        # replacement for not using Codecov — without it, a threshold-trip
        # in CI forces the developer to re-run locally to inspect
        # coverage/index.html.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Smoke test
        run: npm run smoke

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # No `cache: pip` — we manage our own venv cache below with the
          # same stable-key pattern as warm-mteb-venv. Pip's wheel cache
          # would still leave us paying ~30 s for resolve + install per
          # run; caching the entire venv at ~/.venv-docs skips pip
          # invocation entirely on hit (~1 s).

      - name: Python unit tests (scripts/build-seed.py)
        # Pure-logic stdlib unittest — no mteb dependency, no network.
        # Catches filter / extract / alias-table regressions in the seed
        # generator. Cheap (sub-second) so it's fine to run on every PR.
        run: npm run test:python

      # Cache the entire docs-build venv (mkdocs + plugins). Mirrors the
      # warm-mteb-venv pattern (see below): main pushes save under main's
      # scope, dev / PR / tag-triggered runs read it via cross-ref
      # fallthrough. Key includes the FULL Python patch version (e.g.
      # `py3.12.8`) because venv shebangs and wheel ABIs break on patch
      # drift; a runner image's Python bump triggers a clean miss.
      - name: Restore docs venv
        uses: actions/cache/restore@v5
        continue-on-error: true
        id: docs-venv-restore
        with:
          path: ~/.venv-docs
          key: docs-venv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('website/requirements.txt') }}-v1
          # No restore-keys fallback — patch drift breaks venvs (same
          # reasoning as warm-mteb-venv).

      - name: Create docs venv + install (cache miss only)
        if: steps.docs-venv-restore.outputs.cache-hit != 'true'
        id: install-docs-deps
        run: |
          python -m venv ~/.venv-docs
          ~/.venv-docs/bin/pip install --upgrade pip
          ~/.venv-docs/bin/pip install -r website/requirements.txt

      - name: Save docs venv (main pushes only)
        # Save scoped to main so dev / PR / tag-triggered runs benefit
        # via cross-ref fallthrough. Dev/PR runs install on miss but
        # don't save — keeps the saved cache canonical to main's lock.
        if: |
          steps.install-docs-deps.outcome == 'success'
          && steps.docs-venv-restore.outputs.cache-hit != 'true'
          && github.ref == 'refs/heads/main'
          && github.event_name == 'push'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ~/.venv-docs
          key: docs-venv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('website/requirements.txt') }}-v1

      - name: Add docs venv to PATH
        # mkdocs (and its plugins) live in ~/.venv-docs/bin; subsequent
        # steps invoke `mkdocs ...` which finds the venv binary.
        run: echo "$HOME/.venv-docs/bin" >> "$GITHUB_PATH"

      - name: Docs build (strict)
        run: npm run docs:build

      - name: Generated-docs drift check
        run: |
          set -e
          if [ -f scripts/gen-docs.mjs ]; then
            npm run gen-docs -- --check
          fi
          if [ -f scripts/gen-tools-docs.mjs ]; then
            npm run gen-tools-docs -- --check
          fi
          if [ -f scripts/gen-readme-recent.mjs ]; then
            npm run gen-readme-recent -- --check
          fi

      - name: Plugin major.minor check
        run: |
          # Advisory only — the sibling plugin repo isn't checked out in CI,
          # so the script exits 0 with a warning. Local runs (via `npm run
          # promote`) do the real check.
          if [ -f scripts/check-plugin-version.mjs ]; then
            npm run check-plugin
          fi

      - name: Env-var drift check (server.json vs src/)
        # v1.7.5+: every `process.env.X` read in `src/` must appear in
        # `server.json packages[0].environmentVariables[]` (or be on the
        # ALLOWLIST in scripts/check-env-vars.mjs for third-party / legacy
        # / test-only vars). Catches the v1.7.5 class of drift where
        # OBSIDIAN_BRAIN_REFETCH_METADATA was added to source but forgotten
        # in the manifest, silently dropping it from docs/configuration.md.
        run: |
          if [ -f scripts/check-env-vars.mjs ]; then
            npm run check-env-vars
          fi

      - name: Spell check
        run: |
          pip install codespell
          codespell docs/ README.md RELEASING.md --skip="*.json,*.lock"

  # ─── Warm the MTEB venv on the default-branch scope ──────────────────
  #
  # **Why this lives in ci.yml on `push: main`, not in release.yml on tag push:**
  #
  # GitHub Actions caches are scoped per-ref. A workflow run on a tag push
  # (release.yml) saves the cache under that tag's ref (e.g.
  # `refs/heads/refs/tags/v1.7.9`). Tags are sibling refs — they do NOT
  # share caches with each other. Pre-v1.7.10, every release tag uploaded
  # a fresh 2.7 GB cache to its own tag scope, and the next release tag
  # couldn't see it. GitHub docs:
  #
  #   "Workflow runs cannot restore caches created for different tag names.
  #    A cache created for the tag release-a with the base main would not
  #    be accessible to a workflow run triggered for the tag release-b."
  #
  # The workaround: caches saved on the **default branch (main)** fall
  # through to all other refs, including tags. So we save the cache from
  # a workflow that runs on `push: main` (this job), and `release.yml`'s
  # restore step gets a cross-ref fallthrough hit.
  #
  # **What we cache (changed in v1.7.12):** previously cached `~/.cache/pip`
  # (pip's download cache — wheels). On a hit, pip still ran (~60 s) to
  # parse the requirements file, resolve deps, and copy wheels into
  # site-packages. v1.7.12 caches the entire **populated venv at
  # `~/.venv-mteb`** instead — site-packages is already installed, so
  # release.yml just runs `~/.venv-mteb/bin/python scripts/build-seed.py`
  # and skips pip install entirely. ~60 s → ~1 s on hit.
  #
  # **Why a venv (not pip --target):** torch + scipy ship native C
  # extensions compiled against the Python ABI. A venv keeps the
  # interpreter binding correct via `pyvenv.cfg`, and shebangs in
  # `bin/*` reference the venv's own python — works as long as the
  # cache is restored to the same absolute path (`~/.venv-mteb`) and
  # the runner's Python patch version matches. We embed the FULL
  # patch version in the cache key (e.g. `py3.12.8`), so any patch
  # bump on GitHub's runner image triggers a clean rebuild.
  warm-mteb-venv:
    name: Warm MTEB venv (main only)
    runs-on: ubuntu-latest
    # Only main pushes — not dev, not PRs. Cache scope on main falls
    # through to all tag-triggered release.yml runs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          # No `cache: pip` — we manage our own cache below with a stable
          # manual key. setup-python's auto-cache key churns between runs
          # (see release.yml "Setup Python" comment for the full story).

      # Cache key shape (mteb-venv-<os>-<arch>-py<full-patch>-<reqs-hash>-v1):
      # - <os> + <arch>: native extensions are arch-specific
      # - py<full-patch>: e.g. `py3.12.8`. CRITICAL — venv shebangs and
      #   native-extension ABIs break on Python patch drift. setup-python's
      #   `python-version` output gives the resolved full version.
      # - <reqs-hash>: hashFiles of `scripts/requirements-build-seed.txt`
      #   so a manifest change automatically invalidates the cache.
      # - `-v1`: manual cache-buster for situations where we need to force
      #   a rebuild without a manifest change (e.g. CVE patch in a
      #   transitive dep that was cached pre-fix).
      - name: Restore MTEB venv
        uses: actions/cache/restore@v5
        continue-on-error: true
        id: mteb-venv-restore
        with:
          path: ~/.venv-mteb
          key: mteb-venv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('scripts/requirements-build-seed.txt') }}-v1
          # No restore-keys fallback — patch-version drift breaks venvs
          # via shebang + native-ext ABI mismatch (luke.hsiao.dev case
          # study). On a miss we'd rather rebuild cleanly than restore
          # a partial that fails at runtime.

      - name: Create venv + install mteb (cache miss only)
        if: steps.mteb-venv-restore.outputs.cache-hit != 'true'
        id: install-mteb
        run: |
          python -m venv ~/.venv-mteb
          ~/.venv-mteb/bin/pip install --upgrade pip
          ~/.venv-mteb/bin/pip install -r scripts/requirements-build-seed.txt

      - name: Save MTEB venv
        # Only save when (a) install actually ran (cache was a miss) AND
        # (b) succeeded.
        if: steps.install-mteb.outcome == 'success' && steps.mteb-venv-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ~/.venv-mteb
          key: mteb-venv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('scripts/requirements-build-seed.txt') }}-v1
