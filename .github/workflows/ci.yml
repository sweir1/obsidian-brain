# ci.yml — validation-only CI for every PR and every push to main/dev.
#
# What this workflow does:
#   - Build (TypeScript compile)
#   - Unit tests (vitest)
#   - Smoke test (MCP handshake + every registered tool)
#   - Docs build in strict mode (broken links, missing anchors, bad refs)
#   - Generated-docs drift check (configuration.md / tools.md vs server.json / Zod schemas)
#   - Spell check on docs + README + RELEASING.md
#
# What this workflow does NOT do:
#   - No npm publish. No MCP Registry publish. No GitHub Release. No tag creation.
#   - Publishing is tag-driven only, handled by .github/workflows/release.yml, which
#     triggers on `tags: ["v*"]` and has a main-branch guard that refuses tags
#     not reachable from origin/main. So a push to `dev` (or any non-tag event)
#     cannot publish — by trigger, by ref, and by guard.
#
# Concurrency: re-pushes to the same ref cancel older in-flight runs, so the
# latest code on a branch or PR is what gets validated.

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  # Queue, don't cancel: when main moves fast (rapid-fire promotes), we
  # want CI to finish on EVERY tagged commit — otherwise the cascade
  # (commit N+1's push cancels commit N's CI) leaves commit N's release
  # workflow stuck waiting on a CI run that will never succeed.
  #
  # Include the SHA in the group so re-pushes to the SAME commit still
  # coalesce (no duplicate CI runs on force-refreshes), while different
  # commits each get their own queued run.
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

env:
  # Pin transformers.js cache to a known workspace path so actions/cache can
  # restore + save it across runs. Without this override, models land under
  # node_modules/@huggingface/transformers/.cache (default), which survives
  # the cache step only if we target that path explicitly — simpler to just
  # route through $TRANSFORMERS_CACHE. Matches release.yml's pattern.
  TRANSFORMERS_CACHE: ${{ github.workspace }}/.cache/huggingface

jobs:
  validate:
    name: Build, test, smoke, docs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Hugging Face embedding models cache
        # Split restore/save so we only persist the cache AFTER prefetch
        # verifies integrity (see the "Save" step below the prefetch).
        # Without this split, actions/cache's default post-step would save
        # the cache directory unconditionally — including any partial
        # downloads left behind by a killed run. That's the original
        # "Protobuf parsing failed" root cause.
        #
        # Shared across main + dev: actions/cache writes are scoped per
        # branch, but restore-keys fall through to the default branch, so
        # dev runs read from main's cache when their own isn't populated.
        uses: actions/cache/restore@v5
        continue-on-error: true
        id: hf-cache-restore
        with:
          path: ${{ github.workspace }}/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2-bge-small-en-v1.5-v1
          restore-keys: |
            hf-models-all-MiniLM-L6-v2-bge-small-en-v1.5-
            hf-models-all-MiniLM-L6-v2-
            hf-models-

      - name: Build
        run: npm run build

      - name: Prefetch embedding models (with retries + corruption recovery)
        # Runs BEFORE vitest so flaky HF downloads can't surface as opaque
        # Protobuf-parsing errors inside a failing test suite. The script:
        #   - checks for 0-byte / suspiciously-small ONNX files restored
        #     from a prior cache and wipes them pre-emptively
        #   - retries up to 4 times per model with exponential backoff
        #   - on any Protobuf / ONNX / "Unable to get model file" error,
        #     wipes the model's cache subdir and tries again with a fresh
        #     download
        #   - exits non-zero with a clear message if all retries fail,
        #     instead of letting vitest surface a cryptic stack trace
        #
        # This warms the cache deterministically so vitest just reads from
        # disk — no parallel-download races between test files.
        id: prefetch
        run: node scripts/prefetch-test-models.mjs

      - name: Save Hugging Face embedding models cache
        # Only save the cache AFTER prefetch succeeded — `if: success()`
        # scoped to the prefetch step. If prefetch failed or retried with
        # corruption, we skip the save so a corrupt cache doesn't get
        # persisted under the key and poison future runs. This is the
        # defence against the original "killed mid-download → cache saved
        # with partial file → next run trusts it → Protobuf error" cycle.
        #
        # Also skip if the cache was already an exact-key hit on restore —
        # nothing changed, nothing to save.
        if: steps.prefetch.outcome == 'success' && steps.hf-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ${{ github.workspace }}/.cache/huggingface
          key: hf-models-all-MiniLM-L6-v2-bge-small-en-v1.5-v1

      - name: Unit tests + coverage
        # NOTE: if you change this invocation (flags, env, script name),
        # also update the "tests + coverage" step in scripts/preflight.mjs
        # — both places must stay in sync or CI and local will drift.
        run: npm run test:coverage

      - name: Upload coverage report
        # Runs regardless of earlier step outcome so the HTML report is
        # reachable whether CI is green (cheap debugging signal) or red
        # (no local re-run needed to see which file tripped the threshold).
        # Short retention keeps storage trivial. This is the load-bearing
        # replacement for not using Codecov — without it, a threshold-trip
        # in CI forces the developer to re-run locally to inspect
        # coverage/index.html.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Smoke test
        run: npm run smoke

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: website/requirements.txt

      - name: Python unit tests (scripts/build-seed.py)
        # Pure-logic stdlib unittest — no mteb dependency, no network.
        # Catches filter / extract / alias-table regressions in the seed
        # generator. Cheap (sub-second) so it's fine to run on every PR.
        run: npm run test:python

      - name: Install Python deps
        run: pip install -r website/requirements.txt

      - name: Docs build (strict)
        run: npm run docs:build

      - name: Generated-docs drift check
        run: |
          set -e
          if [ -f scripts/gen-docs.mjs ]; then
            npm run gen-docs -- --check
          fi
          if [ -f scripts/gen-tools-docs.mjs ]; then
            npm run gen-tools-docs -- --check
          fi

      - name: Plugin major.minor check
        run: |
          # Advisory only — the sibling plugin repo isn't checked out in CI,
          # so the script exits 0 with a warning. Local runs (via `npm run
          # promote`) do the real check.
          if [ -f scripts/check-plugin-version.mjs ]; then
            npm run check-plugin
          fi

      - name: Env-var drift check (server.json vs src/)
        # v1.7.5+: every `process.env.X` read in `src/` must appear in
        # `server.json packages[0].environmentVariables[]` (or be on the
        # ALLOWLIST in scripts/check-env-vars.mjs for third-party / legacy
        # / test-only vars). Catches the v1.7.5 class of drift where
        # OBSIDIAN_BRAIN_REFETCH_METADATA was added to source but forgotten
        # in the manifest, silently dropping it from docs/configuration.md.
        run: |
          if [ -f scripts/check-env-vars.mjs ]; then
            npm run check-env-vars
          fi

      - name: Spell check
        run: |
          pip install codespell
          codespell docs/ README.md RELEASING.md --skip="*.json,*.lock"
