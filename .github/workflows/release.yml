name: Release

# Triggered ONLY by pushing a version tag like v1.5.2. Not by branch pushes.
# Not by pull requests. Not by dev. A push to `dev` (or any branch that is
# not a tag ref) will NOT fire this workflow — the trigger filter at the
# bottom of this header block (`on: push: tags: ["v*"]`) makes branch
# pushes a no-op for this file.
#
# Defense in depth: even if a v* tag somehow gets created on a non-main
# commit, the "Main-branch guard" step refuses to publish anything whose
# tag is not reachable from origin/main. So dev code cannot ship to npm
# or the MCP Registry by this path — by trigger, by ref, and by guard.
#
# Suggested local flow (use `npm run promote` instead of the raw commands):
#   npm version patch        # bumps package.json + commits + creates v<x.y.z> tag
#   git push --follow-tags   # pushes commit + tag, fires this workflow
#
# The tag is the single source of truth for the published version — this
# workflow rewrites package.json.version + server.json.version +
# server.json.packages[0].version to match the tag before publishing,
# so the three can never drift.
#
# One-time setup required before the first run of this workflow:
#   1. npmjs.com → obsidian-brain → Settings → Trusted Publishers → Add:
#        - Publisher: GitHub Actions
#        - Organization or user: sweir1
#        - Repository: obsidian-brain
#        - Workflow filename: release.yml
#        - Environment: (leave blank)
#      This lets `npm publish` authenticate via OIDC instead of NPM_TOKEN.
#   2. No setup needed for the MCP Registry — the io.github.sweir1/* namespace
#      is bound to OIDC tokens issued for repos under github.com/sweir1/*.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading v), e.g. 1.5.2. Must not already exist on npm."
        required: true

permissions:
  id-token: write   # OIDC for both npm and mcp-publisher
  contents: write   # `gh release create` (mark latest) in the final step

env:
  # Pin transformers.js model cache to a known path so actions/cache can
  # restore+save it across runs. The embedder reads this env var (see
  # src/embeddings/embedder.ts) and overrides transformers.js's `./.cache`
  # default. Without this override, models sometimes land outside the
  # workspace and actions/cache warns "path does not exist" on save.
  TRANSFORMERS_CACHE: ${{ github.workspace }}/.cache/huggingface

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm + MCP Registry
    runs-on: ubuntu-latest
    # Observed runs complete in ~45s. Cap the job at 20min so a HF CDN
    # hang or npm publish stall doesn't eat a 6-hour default timeout.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need enough history to prove the tag descends from main. The
          # default shallow clone (depth=1) can't answer `is-ancestor`.
          fetch-depth: 0

      - name: Refuse to publish tags that aren't on main
        # Defense-in-depth for the dev-branch + cherry-pick workflow:
        # `npm version patch` has a `postversion` lifecycle that auto-pushes
        # the tag, and a tag push fires this workflow regardless of which
        # branch the tag was created on. If the user runs `npm version` on
        # `dev` by muscle memory, without this guard we'd publish `dev`
        # state to npm + the MCP Registry. Refuse explicitly.
        #
        # For workflow_dispatch (manual publish) we skip the check — the
        # caller knows what they're doing and explicitly opted in.
        if: github.event_name == 'push'
        run: |
          git fetch origin main --depth=200
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME is at commit $GITHUB_SHA, which is NOT on origin/main."
            echo "::error::Releases must be cut from main. If this tag came from dev, delete it (\`git tag -d $GITHUB_REF_NAME && git push origin :refs/tags/$GITHUB_REF_NAME\`), cherry-pick the commit to main, then run \`npm version patch\` from main."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME commit $GITHUB_SHA is on main ✓"

      - name: Wait for CI to succeed on this SHA
        # Gate npm publish on CI (ci.yml) passing for the tagged commit.
        # Both CI and this workflow fire on the same push, so we poll for
        # up to 10 min for CI's run at this SHA to finish. If CI fails
        # (or times out), we refuse to publish — tests/docs/spellcheck
        # that ci.yml runs are the authoritative validation and must
        # pass before any artefact reaches npm / the MCP Registry.
        #
        # Skipped for workflow_dispatch (manual publish): the caller is
        # explicitly overriding the normal path.
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 60); do
            result=$(gh run list \
              --workflow CI \
              --commit "$GITHUB_SHA" \
              --json status,conclusion \
              --jq 'first(.[] | select(.status == "completed")) | .conclusion' 2>/dev/null || true)
            if [ "$result" = "success" ]; then
              echo "CI green on $GITHUB_SHA ✓"
              exit 0
            fi
            if [ -n "$result" ] && [ "$result" != "success" ]; then
              echo "::error::CI concluded with '$result' on $GITHUB_SHA — refusing to publish."
              exit 1
            fi
            echo "Waiting for CI on $GITHUB_SHA ($i/60)…"
            sleep 10
          done
          echo "::error::CI did not complete within 10 minutes on $GITHUB_SHA — refusing to publish."
          exit 1

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Resolved version '$VERSION' is not valid semver"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Sync versions in package.json + server.json from tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          echo "--- package.json ---"
          jq '{name, version, mcpName}' package.json
          echo "--- server.json ---"
          jq '{name, version, packages: [.packages[] | {identifier, version}]}' server.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # v1.7.5: regenerate `data/seed-models.json` from the MTEB Python
      # registry. Zero HF API calls — `pip install mteb` ships its own
      # curated `model_prompts` dicts and `max_tokens` values for every
      # model in the benchmark. The pre-v1.7.5 build path fired ~5,500
      # HF requests per release run and routinely tripped rate limits;
      # walking the in-process Python registry replaces all of that with
      # a single `import` and ~50 ms of dict iteration.
      #
      # If the seed regen step fails for any reason (mteb upgrade
      # broke the symbol we import, network flake on `pip install`),
      # the committed anchor seed at `data/seed-models.json` still ships
      # in the npm tarball — `continue-on-error: true` makes the failure
      # observable in the workflow log without blocking the release.
      - name: Setup Python (for MTEB metadata extraction)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-build-seed.txt
      - name: Install mteb
        run: pip install -r scripts/requirements-build-seed.txt
      - name: Regenerate model seed JSON
        run: python3 scripts/build-seed.py
        continue-on-error: true
      - name: Validate seed JSON parses
        run: node -e "JSON.parse(require('fs').readFileSync('data/seed-models.json','utf8'))"

      # Validation (tests, smoke, docs build, coverage, drift check,
      # codespell, plugin-version check, HF model prefetch) runs
      # exclusively in ci.yml on this same commit. The "Wait for CI to
      # succeed on this SHA" step above proved ci.yml was green before
      # we got here, so repeating any of that work would be pure
      # duplication. We only install + build here because `npm publish`
      # needs node_modules (to resolve deps) and dist/ (what actually
      # ships in the tarball).

      # --- Pre-publish validation -------------------------------------
      # Install the MCP Registry CLI and validate `server.json` BEFORE
      # any publish runs. server.json's environmentVariables list is
      # hand-maintained (see RELEASING.md "Env-var hand-edit"), so
      # validation drift is real — a malformed server.json should fail
      # the whole release, not leak through after npm already has the
      # tarball. `./mcp-publisher validate` doesn't need login, only the
      # binary and the server.json file.

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --version

      - name: Validate server.json
        run: ./mcp-publisher validate

      # --- Publish -----------------------------------------------------
      # Both publishes run AFTER server.json validation. If validation
      # fails, neither publish runs — the tag remains on main but nothing
      # ships. Fix server.json on dev, re-run the next promote.

      - name: Publish to npm (OIDC, with provenance)
        run: npm publish --access public

      - name: Login to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      - name: Create / refresh GitHub Release (mark as latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Extract the matching section from docs/CHANGELOG.md as release
          # notes. If no section matches, fall back to an auto-generated note.
          # Using awk so the section extraction doesn't depend on external
          # tooling. Section boundary: `## v${VERSION}` up to the next `## v`
          # or EOF.
          NOTES_FILE=$(mktemp)
          awk -v ver="$VERSION" '
            /^## v/ {
              inside = ($0 ~ "^## v" ver "( |$|—)")
            }
            inside
          ' docs/CHANGELOG.md > "$NOTES_FILE" || true

          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release v${VERSION} — see [CHANGELOG](https://sweir1.github.io/obsidian-brain/CHANGELOG/)." > "$NOTES_FILE"
          fi

          TAG="v${VERSION}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes + marking latest."
            gh release edit "$TAG" --notes-file "$NOTES_FILE" --latest
          else
            echo "Creating release $TAG and marking it latest."
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --latest
          fi

      # NOTE: docs-site deploy is owned by `.github/workflows/docs.yml`,
      # which fires on every push to main (and dev for build-strict
      # validation only) using the official GitHub Pages actions
      # (configure-pages + upload-pages-artifact + deploy-pages). The
      # release-pushes-to-main path triggers docs.yml automatically, so
      # this workflow does NOT need its own docs-deploy step.
