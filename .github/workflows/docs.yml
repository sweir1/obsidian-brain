name: Deploy docs site

on:
  push:
    branches: [main, dev]
    paths:
      - docs/**
      - website/**
      - .github/workflows/docs.yml
  workflow_dispatch:

# Pages write / id-token are only used by the deploy job on main — the build
# job on dev doesn't need them. Scoping widely here is fine because the
# deploy job has its own `if:` guard below.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deploy at a time; queue new runs rather than cancel in-flight ones
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site (strict)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # git-revision-date-localized needs full history

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # No `cache: pip` — we manage our own venv cache. See ci.yml for
          # the full rationale; mirrors warm-mteb-venv: cache the entire
          # populated venv so pip install is skipped (~30 s → ~1 s on hit).

      # Cache shared with ci.yml's docs-build step (same key shape).
      # Saved by main pushes (in either workflow), restored cross-ref by
      # everything else.
      # Cache actions don't honour the job's `defaults.run.working-directory`
      # (only `run:` steps do); paths and hashFiles globs always resolve
      # from the workspace root regardless of which subdir we're in.
      - name: Restore docs venv
        uses: actions/cache/restore@v5
        continue-on-error: true
        id: docs-venv-restore
        with:
          path: ~/.venv-docs
          key: docs-venv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('website/requirements.txt') }}-v1

      - name: Create docs venv + install (cache miss only)
        # Override the job's website/ default so the relative path
        # `website/requirements.txt` works from the repo root.
        if: steps.docs-venv-restore.outputs.cache-hit != 'true'
        id: install-docs-deps
        working-directory: ${{ github.workspace }}
        run: |
          python -m venv ~/.venv-docs
          ~/.venv-docs/bin/pip install --upgrade pip
          ~/.venv-docs/bin/pip install -r website/requirements.txt

      - name: Save docs venv (main pushes only)
        if: |
          steps.install-docs-deps.outcome == 'success'
          && steps.docs-venv-restore.outputs.cache-hit != 'true'
          && github.ref == 'refs/heads/main'
          && github.event_name == 'push'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: ~/.venv-docs
          key: docs-venv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('website/requirements.txt') }}-v1

      - name: Add docs venv to PATH
        working-directory: ${{ github.workspace }}
        run: echo "$HOME/.venv-docs/bin" >> "$GITHUB_PATH"

      # Runs on every branch — this is the cheap "strict build" check that
      # catches broken internal links, missing nav entries, and MkDocs errors
      # on dev before the commit gets cherry-picked to main. No deploy.
      - name: Build site (strict)
        run: mkdocs build --strict

      # Pages artifact upload only fires for main; keeps dev from queuing
      # a no-op deploy job and (more importantly) from ever producing an
      # artifact that could be deployed by hand.
      - name: Configure Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/site

  deploy:
    name: Deploy to GitHub Pages
    # Deploy is main-only. Dev builds validate docs but never touch the
    # live site — so a broken cherry-pick is caught by the build-strict
    # check before it lands on main, and the live site is not touched by
    # anything originating on dev.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
